<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚀 CryptoBot Pro</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #151520;
            --card2: #1c1c2e;
            --gold: #f7931a;
            --gold2: #ffaa4a;
            --green: #00e676;
            --red: #ff3d5a;
            --blue: #448aff;
            --purple: #b388ff;
            --text: #ffffff;
            --text2: #9e9eb8;
            --border: #252540;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        .bg-particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--gold);
            opacity: 0.1;
            animation: float 15s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }

        /* Шапка */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
            padding: 20px 16px 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 4px;
        }
        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--gold), #ff6b6b);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 15px rgba(247,147,26,0.3);
        }
        .header h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            font-size: 11px;
            color: var(--text2);
            letter-spacing: 1px;
        }

        /* Бегущая строка */
        .marquee {
            background: var(--card);
            padding: 10px 0;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 105px;
            z-index: 99;
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 30s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .marquee-item {
            display: inline-block;
            padding: 4px 12px;
            margin: 0 4px;
            background: var(--card2);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .marquee-item .m-up { color: var(--green); }
        .marquee-item .m-down { color: var(--red); }

        /* Навигация */
        .nav {
            display: flex;
            gap: 6px;
            padding: 12px;
            overflow-x: auto;
            position: sticky;
            top: 140px;
            background: var(--bg);
            z-index: 98;
            scrollbar-width: none;
        }
        .nav::-webkit-scrollbar { display: none; }
        .nav-btn {
            padding: 10px 16px;
            border-radius: 25px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text2);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-btn:hover { border-color: var(--gold); }
        .nav-btn.active {
            background: linear-gradient(135deg, var(--gold), #ff8c00);
            color: #000;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(247,147,26,0.3);
            font-weight: 700;
        }
        .nav-badge {
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
        }

        /* Контент */
        .container {
            padding: 12px;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .tab-content {
            display: none;
            animation: fadeSlide 0.4s ease;
        }
        .tab-content.active { display: block; }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Секция */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin: 20px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-icon {
            width: 30px;
            height: 30px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .icon-green { background: rgba(0,230,118,0.15); }
        .icon-red { background: rgba(255,61,90,0.15); }
        .icon-gold { background: rgba(247,147,26,0.15); }

        /* Карточки монет */
        .coin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .coin-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .coin-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0;
            transition: 0.3s;
        }
        .coin-card:active {
            transform: scale(0.96);
            border-color: var(--gold);
        }
        .coin-card:active::before { opacity: 1; }
        .coin-card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .coin-symbol {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .coin-rank {
            font-size: 10px;
            color: var(--text2);
            background: var(--card2);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .coin-star {
            font-size: 18px;
            cursor: pointer;
            z-index: 2;
            transition: 0.2s;
            position: relative;
        }
        .coin-star:active { transform: scale(1.4); }
        .coin-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--green);
            margin: 4px 0;
        }
        .coin-change {
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .coin-change.up { color: var(--green); }
        .coin-change.down { color: var(--red); }
        .coin-volume {
            font-size: 10px;
            color: var(--text2);
            margin-top: 4px;
        }

        /* Карточка детальная */
        .detail-card {
            background: linear-gradient(135deg, #1a1a35, #151528);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            margin: 12px 0;
            position: relative;
            overflow: hidden;
        }
        .detail-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(247,147,26,0.1), transparent);
            border-radius: 50%;
        }
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }
        .detail-symbol {
            font-size: 28px;
            font-weight: 800;
        }
        .detail-price {
            font-size: 36px;
            font-weight: 800;
            margin: 8px 0;
            position: relative;
            z-index: 1;
        }
        .detail-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            position: relative;
            z-index: 1;
        }
        .detail-stat {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        .detail-stat-label {
            font-size: 10px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .detail-stat-value {
            font-size: 16px;
            font-weight: 700;
        }

        /* Популярность */
        .popularity-bar {
            height: 6px;
            background: var(--card2);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        .popularity-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold2));
            transition: width 0.5s ease;
        }

        /* Портфель */
        .pf-summary {
            background: linear-gradient(135deg, #1a1a35, #151528);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .pf-total-label {
            font-size: 11px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .pf-total-value {
            font-size: 36px;
            font-weight: 800;
            margin: 8px 0;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .pf-pnl {
            font-size: 14px;
            font-weight: 600;
        }
        .pf-item {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .pf-item:active { border-color: var(--gold); }
        .pf-item-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pf-symbol {
            font-size: 16px;
            font-weight: 700;
        }
        .pf-delete {
            color: var(--red);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }
        .pf-details {
            font-size: 12px;
            color: var(--text2);
            margin-top: 6px;
        }
        .pf-item-pnl {
            font-weight: 600;
            margin-top: 4px;
            font-size: 13px;
        }
        .pf-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text2);
        }
        .pf-empty-icon {
            font-size: 60px;
            margin-bottom: 12px;
        }

        /* Алерты */
        .alert-item {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .alert-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }
        .badge-above { background: rgba(0,230,118,0.2); color: var(--green); }
        .badge-below { background: rgba(255,61,90,0.2); color: var(--red); }

        /* Кнопки */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin: 6px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold), #ff8c00);
            color: #000;
            box-shadow: 0 4px 15px rgba(247,147,26,0.3);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
        }
        .btn-red {
            background: var(--red);
            color: #fff;
        }
        .btn-sm {
            width: auto;
            padding: 8px 16px;
            font-size: 13px;
            border-radius: 10px;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }
        .modal.active { display: flex; }
        .modal-box {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            width: 100%;
            max-width: 380px;
            animation: modalIn 0.3s ease;
            border: 1px solid var(--border);
            max-height: 80vh;
            overflow-y: auto;
        }
        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-close {
            float: right;
            background: var(--card2);
            border: none;
            color: var(--text2);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }
        .modal-symbol {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .modal-price {
            font-size: 40px;
            font-weight: 800;
            margin: 8px 0;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e30;
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 600;
            z-index: 300;
            display: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            animation: toastUp 0.3s ease;
        }
        @keyframes toastUp {
            from { transform: translateX(-50%) translateY(20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* Нижнее меню */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            display: flex;
            border-top: 1px solid var(--border);
            z-index: 100;
            padding: 6px;
            backdrop-filter: blur(10px);
        }
        .bottom-btn {
            flex: 1;
            padding: 8px;
            border: none;
            background: none;
            color: var(--text2);
            font-size: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            border-radius: 12px;
        }
        .bottom-btn .b-icon { font-size: 22px; display: block; margin-bottom: 2px; }
        .bottom-btn.active {
            color: var(--gold);
            background: rgba(247,147,26,0.1);
        }

        /* Поиск */
        .search-box {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }
        .search-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        .search-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(247,147,26,0.1);
        }
        .search-input::placeholder { color: var(--text2); }

        .highlight { color: var(--gold); }

        @media (max-width: 380px) {
            .coin-grid { grid-template-columns: 1fr; }
            .detail-stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Частицы фона -->
    <div class="bg-particles" id="particles"></div>

    <!-- Шапка -->
    <div class="header">
        <div class="header-top">
            <div class="logo">🪙</div>
            <h1>CryptoBot Pro</h1>
        </div>
        <p>REAL-TIME CRYPTO TRACKER</p>
    </div>

    <!-- Бегущая строка -->
    <div class="marquee">
        <div class="marquee-content" id="marqueeContent">Загрузка данных...</div>
    </div>

    <!-- Навигация -->
    <div class="nav" id="topNav">
        <button class="nav-btn active" data-tab="prices">
            💰 Цены
        </button>
        <button class="nav-btn" data-tab="portfolio">
            💼 Портфель <span class="nav-badge" id="pfBadge">0</span>
        </button>
        <button class="nav-btn" data-tab="favorites">
            ⭐ Избранное <span class="nav-badge" id="favBadge">0</span>
        </button>
        <button class="nav-btn" data-tab="alerts">
            🔔 Алерты <span class="nav-badge" id="alertBadge">0</span>
        </button>
    </div>

    <div class="container">
        <!-- Вкладка Цены -->
        <div class="tab-content active" id="prices">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск монеты...">
            </div>
            <div class="section-title">
                <span class="section-icon icon-green">📈</span> Лидеры роста
            </div>
            <div class="coin-grid" id="gainersGrid"></div>
            
            <div class="section-title">
                <span class="section-icon icon-red">📉</span> Максимальное падение
            </div>
            <div class="coin-grid" id="losersGrid"></div>
            
            <div class="section-title">
                <span class="section-icon icon-gold">🔥</span> Все монеты
            </div>
            <div class="coin-grid" id="allCoinsGrid"></div>
        </div>

        <!-- Вкладка Портфель -->
        <div class="tab-content" id="portfolio">
            <div class="pf-summary" id="pfSummary">
                <p class="pf-total-label">📊 ОБЩАЯ СТОИМОСТЬ</p>
                <p class="pf-total-value" id="pfTotalValue">$0.00</p>
                <p class="pf-pnl" id="pfTotalPnl" style="color:var(--text2);">Добавьте монеты в портфель</p>
            </div>
            <div id="pfList"></div>
            <button class="btn btn-gold" onclick="showAddPf()">➕ Добавить монету</button>
            <button class="btn btn-outline" onclick="clearPortfolio()">🗑 Очистить портфель</button>
        </div>

        <!-- Вкладка Избранное -->
        <div class="tab-content" id="favorites">
            <div class="search-box">
                <input type="text" class="search-input" id="favSearch" placeholder="🔍 Поиск в избранном...">
            </div>
            <div class="coin-grid" id="favGrid"></div>
        </div>

        <!-- Вкладка Алерты -->
        <div class="tab-content" id="alerts">
            <div id="alertList"></div>
            <button class="btn btn-gold" onclick="showAddAlert()">➕ Создать алерт</button>
        </div>
    </div>

    <!-- Модальное окно монеты -->
    <div class="modal" id="coinModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeCoinModal()">✕</button>
            <div class="detail-card" style="margin:0;">
                <div class="detail-header">
                    <span class="detail-symbol" id="modSymbol">BTC</span>
                    <span id="modRank" style="font-size:12px;color:var(--text2);">#1</span>
                </div>
                <div class="detail-price" id="modPrice">$0.00</div>
                <div class="detail-stats">
                    <div class="detail-stat">
                        <div class="detail-stat-label">24ч изменение</div>
                        <div class="detail-stat-value" id="modChange">0%</div>
                    </div>
                    <div class="detail-stat">
                        <div class="detail-stat-label">Максимум</div>
                        <div class="detail-stat-value" id="modHigh">$0</div>
                    </div>
                    <div class="detail-stat">
                        <div class="detail-stat-label">Минимум</div>
                        <div class="detail-stat-value" id="modLow">$0</div>
                    </div>
                    <div class="detail-stat">
                        <div class="detail-stat-label">Объём 24ч</div>
                        <div class="detail-stat-value" id="modVolume">$0</div>
                    </div>
                </div>
                <div style="margin-top:12px;">
                    <span style="font-size:11px;color:var(--text2);">Популярность</span>
                    <div class="popularity-bar">
                        <div class="popularity-fill" id="modPopularity" style="width:50%;"></div>
                    </div>
                </div>
            </div>
            <button class="btn btn-gold" id="modFavBtn" onclick="toggleFavFromModal()" style="margin-top:12px;">⭐ В избранное</button>
            <button class="btn btn-outline" onclick="addToPortfolioFromModal()">💼 Добавить в портфель</button>
            <button class="btn btn-outline" onclick="setAlertFromModal()">🔔 Создать алерт</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Нижняя навигация -->
    <div class="bottom-nav">
        <button class="bottom-btn active" onclick="switchTab('prices')">
            <span class="b-icon">💰</span>Цены
        </button>
        <button class="bottom-btn" onclick="switchTab('portfolio')">
            <span class="b-icon">💼</span>Портфель
        </button>
        <button class="bottom-btn" onclick="switchTab('favorites')">
            <span class="b-icon">⭐</span>Избранное
        </button>
        <button class="bottom-btn" onclick="switchTab('alerts')">
            <span class="b-icon">🔔</span>Алерты
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Данные
        let allCoins = [];
        let favorites = JSON.parse(localStorage.getItem('crypto_fav') || '[]');
        let portfolio = JSON.parse(localStorage.getItem('crypto_pf') || '[]');
        let alerts = JSON.parse(localStorage.getItem('crypto_alerts') || '[]');
        let currentCoin = '';
        let coinPrices = {};

        // Фон с частицами
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.width = Math.random() * 10 + 5 + 'px';
                p.style.height = p.style.width;
                p.style.animationDelay = Math.random() * 10 + 's';
                p.style.animationDuration = Math.random() * 20 + 10 + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        // API
        async function fetchAllData() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const data = await res.json();
                allCoins = data
                    .filter(i => i.symbol.endsWith('USDT'))
                    .map((i, idx) => ({
                        s: i.symbol.replace('USDT', ''),
                        p: parseFloat(i.lastPrice),
                        c: parseFloat(i.priceChangePercent),
                        h: parseFloat(i.highPrice),
                        l: parseFloat(i.lowPrice),
                        v: parseFloat(i.volume),
                        q: parseFloat(i.quoteVolume),
                        rank: idx + 1
                    }))
                    .filter(c => c.p > 0.0001 && c.q > 100000);
                
                allCoins.forEach(c => { coinPrices[c.s] = c; });
                
                // Сортируем по объёму для ранга
                allCoins.sort((a,b) => b.q - a.q);
                allCoins.forEach((c, i) => c.rank = i + 1);
                
                updateAll();
            } catch(e) {
                console.error('API Error:', e);
                document.getElementById('gainersGrid').innerHTML = 
                    '<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--text2);">🔄 Загрузка данных...<br><small>Проверьте подключение к интернету</small></div>';
            }
        }

        function updateAll() {
            displayPrices();
            updateMarquee();
            updatePortfolioDisplay();
            updateFavoritesDisplay();
            updateAlertsDisplay();
            updateBadges();
        }

        // Отображение цен
        function displayPrices(filter = '') {
            let coins = [...allCoins];
            
            if (filter) {
                coins = coins.filter(c => c.s.toLowerCase().includes(filter.toLowerCase()));
            }

            const gainers = [...coins].sort((a,b) => b.c - a.c).slice(0, 6);
            const losers = [...coins].sort((a,b) => a.c - b.c).slice(0, 6);
            const topByVolume = [...coins].sort((a,b) => b.q - a.q).slice(0, 20);

            document.getElementById('gainersGrid').innerHTML = gainers.map(c => coinCardHTML(c)).join('');
            document.getElementById('losersGrid').innerHTML = losers.map(c => coinCardHTML(c)).join('');
            document.getElementById('allCoinsGrid').innerHTML = topByVolume.map(c => coinCardHTML(c)).join('');
        }

        function coinCardHTML(coin) {
            const isFav = favorites.includes(coin.s);
            const price = formatPrice(coin.p);
            const changeClass = coin.c >= 0 ? 'up' : 'down';
            const volume = formatVolume(coin.q);
            const popularity = Math.min(100, Math.round((coin.q / (allCoins[0]?.q || 1)) * 100));

            return `
                <div class="coin-card" onclick="openCoinModal('${coin.s}')">
                    <div class="coin-card-top">
                        <span class="coin-symbol">${coin.s}</span>
                        <span class="coin-rank">#${coin.rank}</span>
                    </div>
                    <span class="coin-star" onclick="event.stopPropagation();toggleFav('${coin.s}')">${isFav ? '⭐' : '☆'}</span>
                    <div class="coin-price">$${price}</div>
                    <div class="coin-change ${changeClass}">
                        ${coin.c >= 0 ? '📈' : '📉'} ${coin.c >= 0 ? '+' : ''}${coin.c.toFixed(2)}%
                    </div>
                    <div class="coin-volume">Vol: ${volume}</div>
                    <div class="popularity-bar" style="margin-top:6px;">
                        <div class="popularity-fill" style="width:${popularity}%;"></div>
                    </div>
                </div>
            `;
        }

        function formatPrice(p) {
            if (p < 0.001) return p.toFixed(6);
            if (p < 1) return p.toFixed(4);
            if (p < 100) return p.toFixed(2);
            return p.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function formatVolume(v) {
            if (v > 1e9) return '$' + (v/1e9).toFixed(2) + 'B';
            if (v > 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
            if (v > 1e3) return '$' + (v/1e3).toFixed(0) + 'K';
            return '$' + v.toFixed(0);
        }

        // Бегущая строка
        function updateMarquee() {
            const top = [...allCoins].sort((a,b) => b.c - a.c).slice(0, 20);
            const content = top.map(c => 
                `<span class="marquee-item">${c.s} <span class="${c.c>=0?'m-up':'m-down'}">${c.c>=0?'+':''}${c.c.toFixed(2)}%</span></span>`
            ).join(' • ');
            document.getElementById('marqueeContent').innerHTML = content + ' • ' + content;
        }

        // Модальное окно
        function openCoinModal(sym) {
            currentCoin = sym;
            const coin = coinPrices[sym];
            if (!coin) return;

            document.getElementById('modSymbol').textContent = sym;
            document.getElementById('modRank').textContent = '#' + coin.rank;
            document.getElementById('modPrice').textContent = '$' + formatPrice(coin.p);
            
            const changeEl = document.getElementById('modChange');
            changeEl.textContent = (coin.c >= 0 ? '+' : '') + coin.c.toFixed(2) + '%';
            changeEl.style.color = coin.c >= 0 ? 'var(--green)' : 'var(--red)';
            
            document.getElementById('modHigh').textContent = '$' + formatPrice(coin.h);
            document.getElementById('modLow').textContent = '$' + formatPrice(coin.l);
            document.getElementById('modVolume').textContent = formatVolume(coin.q);
            
            const popularity = Math.min(100, Math.round((coin.q / (allCoins[0]?.q || 1)) * 100));
            document.getElementById('modPopularity').style.width = popularity + '%';
            
            document.getElementById('modFavBtn').textContent = favorites.includes(sym) ? '⭐ Удалить из избранного' : '☆ Добавить в избранное';
            
            document.getElementById('coinModal').classList.add('active');
        }

        function closeCoinModal() {
            document.getElementById('coinModal').classList.remove('active');
        }
