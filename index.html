<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚀 CryptoBot Web App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --card-hover: #1e1e1e;
            --text: #ffffff;
            --text-secondary: #999999;
            --accent: #f7931a;
            --accent2: #e84393;
            --green: #00d4aa;
            --red: #ff4757;
            --border: #2a2a2a;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Шапка */
        .header {
            background: linear-gradient(135deg, #f7931a 0%, #e84393 100%);
            padding: 24px 16px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(247, 147, 26, 0.3);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .header .subtitle {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 4px;
            font-weight: 500;
        }

        .header .price-ticker {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .ticker-item {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .ticker-item .up {
            color: #00ff88;
        }

        .ticker-item .down {
            color: #ff6b6b;
        }

        /* Навигация */
        .nav {
            display: flex;
            gap: 4px;
            padding: 12px 12px 0;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            position: sticky;
            top: 130px;
            background: var(--bg);
            z-index: 99;
            padding-bottom: 8px;
        }

        .nav::-webkit-scrollbar {
            display: none;
        }

        .nav-btn {
            flex-shrink: 0;
            padding: 8px 14px;
            border-radius: 20px;
            border: none;
            background: var(--card);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-btn.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 4px 12px rgba(247, 147, 26, 0.4);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        /* Контент */
        .container {
            padding: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Карточки монет */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin: 16px 0 10px;
            padding-left: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .coin-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .coin-card {
            background: var(--card);
            border-radius: 14px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .coin-card:active {
            transform: scale(0.97);
            background: var(--card-hover);
        }

        .coin-card .symbol {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .coin-card .price {
            font-size: 16px;
            font-weight: 700;
            color: var(--green);
        }

        .coin-card .change {
            font-size: 12px;
            font-weight: 600;
            margin-top: 2px;
        }

        .coin-card .change.positive {
            color: var(--green);
        }

        .coin-card .change.negative {
            color: var(--red);
        }

        .coin-card .fav-star {
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 16px;
            cursor: pointer;
            z-index: 2;
            transition: 0.2s;
        }

        .coin-card .fav-star:active {
            transform: scale(1.3);
        }

        /* Поиск */
        .search-box {
            margin: 12px 0;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 40px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(247, 147, 26, 0.1);
        }

        .search-box .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: var(--text-secondary);
        }

        .search-results {
            max-height: 300px;
            overflow-y: auto;
            background: var(--card);
            border-radius: 14px;
            margin-top: 4px;
            border: 1px solid var(--border);
            display: none;
        }

        .search-results.active {
            display: block;
        }

        .search-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .search-item:last-child {
            border-bottom: none;
        }

        .search-item:active {
            background: var(--card-hover);
        }

        /* Портфель */
        .portfolio-summary {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            padding: 20px;
            margin: 16px 0;
            text-align: center;
            border: 1px solid var(--border);
        }

        .portfolio-summary .total-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .portfolio-summary .total-value {
            font-size: 32px;
            font-weight: 800;
            margin: 8px 0;
        }

        .portfolio-summary .pnl {
            font-size: 14px;
            font-weight: 600;
        }

        .portfolio-item {
            background: var(--card);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            position: relative;
        }

        .portfolio-item .pf-symbol {
            font-size: 16px;
            font-weight: 700;
        }

        .portfolio-item .pf-details {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .portfolio-item .pf-pnl {
            font-size: 14px;
            font-weight: 600;
            margin-top: 4px;
        }

        .portfolio-item .delete-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            font-size: 18px;
        }

        /* Кнопки */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin: 8px 0;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }

        .btn-danger {
            background: var(--red);
            color: #fff;
        }

        /* Модальное окно */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 380px;
            animation: slideUp 0.3s ease;
            border: 1px solid var(--border);
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
        }

        .modal-symbol {
            font-size: 24px;
            font-weight: 800;
        }

        .modal-price {
            font-size: 36px;
            font-weight: 800;
            margin: 12px 0;
        }

        .modal-stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-top: 1px solid var(--border);
            font-size: 14px;
        }

        .modal-stat span:last-child {
            font-weight: 600;
        }

        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-actions .btn {
            margin: 0;
            padding: 12px;
            font-size: 13px;
        }

        /* Алерты */
        .alert-item {
            background: var(--card);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .alert-info .alert-symbol {
            font-weight: 700;
            font-size: 15px;
        }

        .alert-info .alert-condition {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Профиль */
        .profile-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }

        .profile-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 12px;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
        }

        .profile-username {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 4px 0;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 16px;
        }

        .stat-item {
            background: var(--card);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Toast уведомления */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            z-index: 9999;
            animation: toastIn 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        @keyframes toastIn {
            from { transform: translateX(-50%) translateY(20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* Нижняя навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            padding: 8px;
            border-top: 1px solid var(--border);
            z-index: 100;
        }

        .bottom-nav-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            padding: 6px;
            text-align: center;
            transition: 0.2s;
            flex: 1;
        }

        .bottom-nav-btn .icon {
            font-size: 20px;
            display: block;
        }

        .bottom-nav-btn.active {
            color: var(--accent);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <!-- Шапка с тикером -->
    <div class="header">
        <h1>🚀 CryptoBot</h1>
        <p class="subtitle">Web App • Реальное время</p>
        <div class="price-ticker" id="ticker">
            <span class="ticker-item">Загрузка...</span>
        </div>
    </div>

    <!-- Верхняя навигация -->
    <div class="nav" id="topNav">
        <button class="nav-btn active" data-tab="prices">💰 Все монеты</button>
        <button class="nav-btn" data-tab="portfolio">💼 Портфель</button>
        <button class="nav-btn" data-tab="favorites">⭐ Избранное</button>
        <button class="nav-btn" data-tab="alerts">🔔 Алерты</button>
        <button class="nav-btn" data-tab="profile">👤 Профиль</button>
    </div>

    <!-- Контент -->
    <div class="container">

        <!-- Вкладка: Цены -->
        <div class="tab-content active" id="prices">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Поиск монеты... (BTC, ETH, SOL)">
            </div>
            <div class="search-results" id="searchResults"></div>
            <div class="section-title">🔥 Топ движения</div>
            <div class="coin-grid" id="coinGrid"></div>
        </div>

        <!-- Вкладка: Портфель -->
        <div class="tab-content" id="portfolio">
            <div class="portfolio-summary" id="portfolioSummary">
                <p class="total-label">💰 Общая стоимость</p>
                <p class="total-value">$0.00</p>
                <p class="pnl">PnL: $0.00 (0.00%)</p>
            </div>
            <div id="portfolioList"></div>
            <button class="btn btn-primary" onclick="showAddPortfolioForm()">➕ Добавить актив</button>
            <button class="btn btn-outline" onclick="clearPortfolio()">🗑 Очистить портфель</button>
        </div>

        <!-- Вкладка: Избранное -->
        <div class="tab-content" id="favorites">
            <div id="favoritesList"></div>
        </div>

        <!-- Вкладка: Алерты -->
        <div class="tab-content" id="alerts">
            <div id="alertsList"></div>
            <button class="btn btn-primary" onclick="showAddAlertForm()">➕ Создать алерт</button>
        </div>

        <!-- Вкладка: Профиль -->
        <div class="tab-content" id="profile">
            <div class="profile-card">
                <div class="profile-avatar">👤</div>
                <p class="profile-name" id="profileName">Пользователь</p>
                <p class="profile-username" id="profileUsername">@username</p>
            </div>
            <div class="stat-grid">
                <div class="stat-item">
                    <p class="stat-value" id="statPortfolio">0</p>
                    <p class="stat-label">Активов</p>
                </div>
                <div class="stat-item">
                    <p class="stat-value" id="statFavorites">0</p>
                    <p class="stat-label">Избранных</p>
                </div>
                <div class="stat-item">
                    <p class="stat-value" id="statAlerts">0</p>
                    <p class="stat-label">Алертов</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно деталей монеты -->
    <div class="modal-overlay" id="coinModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-symbol" id="modalSymbol">BTC</span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <p class="modal-price" id="modalPrice">$0.00</p>
            <div class="modal-stat">
                <span>24ч изменение</span>
                <span id="modalChange">0.00%</span>
            </div>
            <div class="modal-stat">
                <span>Максимум 24ч</span>
                <span id="modalHigh">$0.00</span>
            </div>
            <div class="modal-stat">
                <span>Минимум 24ч</span>
                <span id="modalLow">$0.00</span>
            </div>
            <div class="modal-stat">
                <span>Объём 24ч</span>
                <span id="modalVolume">$0</span>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="modalFavBtn" onclick="toggleFavorite()">⭐ Избранное</button>
                <button class="btn btn-outline" onclick="showAddAlertForCoin()">🔔 Алерт</button>
            </div>
            <button class="btn btn-primary" style="margin-top:8px;" onclick="addToPortfolioFromModal()">💼 В портфель</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast" style="display:none;"></div>

    <script>
        // ====== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ======
        const API_URL = 'https://api.binance.com/api/v3';
        let favorites = JSON.parse(localStorage.getItem('crypto_fav') || '[]');
        let portfolio = JSON.parse(localStorage.getItem('crypto_pf') || '[]');
        let alerts = JSON.parse(localStorage.getItem('crypto_alerts') || '[]');
        let currentCoin = 'BTC';
        let allCoins = [];
        let prices = {};

        // Популярные монеты
        const POPULAR_COINS = [
            'BTC', 'ETH', 'BNB', 'SOL', 'XRP', 'ADA', 'DOGE', 'AVAX', 'DOT', 'MATIC',
            'LINK', 'UNI', 'SHIB', 'LTC', 'ATOM', 'ETC', 'XLM', 'BCH', 'ALGO', 'VET',
            'ICP', 'FIL', 'SAND', 'AXS', 'EGLD', 'THETA', 'FTM', 'GRT', 'MANA', 'EOS',
            'AAVE', 'FLOW', 'GALA', 'CHZ', 'ENJ', 'ZEC', 'DASH', 'NEO', 'SNX', 'COMP',
            'BAT', 'ZRX', 'ANKR', 'ONE', 'CELO', 'HOT', 'ZIL', 'KAVA', 'WAVES', 'AR'
        ];

        // ====== API ЗАПРОСЫ ======
        async function fetchAPI(endpoint) {
            try {
                const response = await fetch(`${API_URL}${endpoint}`);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return null;
            }
        }

        async function loadAllPrices() {
            const data = await fetchAPI('/ticker/24hr');
            if (data) {
                allCoins = data
                    .filter(item => item.symbol.endsWith('USDT'))
                    .map(item => ({
                        symbol: item.symbol.replace('USDT', ''),
                        price: parseFloat(item.lastPrice),
                        change: parseFloat(item.priceChangePercent),
                        high: parseFloat(item.highPrice),
                        low: parseFloat(item.lowPrice),
                        volume: parseFloat(item.volume)
                    }))
                    .filter(coin => coin.price > 0.001 && Math.abs(coin.change) > 0);

                // Обновляем кэш цен
                allCoins.forEach(coin => {
                    prices[coin.symbol] = coin;
                });
            }
            return data;
        }

        // ====== ОТОБРАЖЕНИЕ ======
        function displayCoins(filter = '') {
            const grid = document.getElementById('coinGrid');
            let coins = [...allCoins];

            // Сортируем по объёму
            coins.sort((a, b) => b.volume - a.volume);

            // Фильтр поиска
            if (filter) {
                coins = coins.filter(c => c.symbol.toLowerCase().includes(filter.toLowerCase()));
            }

            // Топ-10 роста
            const gainers = [...coins].sort((a, b) => b.change - a.change).slice(0, 5);
            // Топ-10 падения
            const losers = [...coins].sort((a, b) => a.change - b.change).slice(0, 5);

            let html = '<div class="section-title">📈 Лидеры роста</div>';
            html += '<div class="coin-grid">';
            gainers.forEach(coin => {
                html += createCoinCard(coin);
            });
            html += '</div>';

            html += '<div class="section-title">📉 Падение</div>';
            html += '<div class="coin-grid">';
            losers.forEach(coin => {
                html += createCoinCard(coin);
            });
            html += '</div>';

            grid.innerHTML = html;

            // Обновляем тикер
            updateTicker(gainers[0], gainers[1], gainers[2]);
        }

        function createCoinCard(coin) {
            const isFav = favorites.includes(coin.symbol);
            const priceStr = coin.price < 1 ? coin.price.toFixed(4) : coin.price < 100 ? coin.price.toFixed(3) : coin.price.toFixed(2);
            const changeClass = coin.change >= 0 ? 'positive' : 'negative';

            return `
                <div class="coin-card" onclick="openCoinDetail('${coin.symbol}')">
                    <span class="fav-star" onclick="event.stopPropagation(); toggleFav('${coin.symbol}')">${isFav ? '⭐' : '☆'}</span>
                    <div class="symbol">${coin.symbol}</div>
                    <div class="price">$${priceStr}</div>
                    <div class="change ${changeClass}">${coin.change >= 0 ? '+' : ''}${coin.change.toFixed(2)}%</div>
                </div>
            `;
        }

        function updateTicker(coin1, coin2, coin3) {
            const ticker = document.getElementById('ticker');
            if (!coin1) return;
            ticker.innerHTML = `
                <span class="ticker-item">${coin1.symbol} <span class="${coin1.change >= 0 ? 'up' : 'down'}">${coin1.change >= 0 ? '+' : ''}${coin1.change.toFixed(2)}%</span></span>
                <span class="ticker-item">${coin2.symbol} <span class="${coin2.change >= 0 ? 'up' : 'down'}">${coin2.change >= 0 ? '+' : ''}${coin2.change.toFixed(2)}%</span></span>
                <span class="ticker-item">${coin3.symbol} <span class="${coin3.change >= 0 ? 'up' : 'down'}">${coin3.change >= 0 ? '+' : ''}${coin3.change.toFixed(2)}%</span></span>
            `;
        }

        // ====== МОДАЛЬНОЕ ОКНО ======
        function openCoinDetail(symbol) {
            currentCoin = symbol;
            const coin = prices[symbol];
            if (!coin) return;

            document.getElementById('modalSymbol').textContent = symbol;
            document.getElementById('modalPrice').textContent = '$' + (coin.price < 1 ? coin.price.toFixed(4) : coin.price.toFixed(2));
            
            const changeEl = document.getElementById('modalChange');
            changeEl.textContent = (coin.change >= 0 ? '+' : '') + coin.change.toFixed(2) + '%';
            changeEl.style.color = coin.change >= 0 ? 'var(--green)' : 'var(--red)';
            
            document.getElementById('modalHigh').textContent = '$' + coin.high.toFixed(2);
            document.getElementById('modalLow').textContent = '$' + coin.low.toFixed(2);
            document.getElementById('modalVolume').textContent = '$' + formatVolume(coin.volume);
            
            document.getElementById('modalFavBtn').textContent = favorites.includes(symbol) ? '⭐ Удалить из избранного' : '☆ В избранное';
            
            document.getElementById('coinModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('coinModal').classList.remove('active');
        }

        function toggleFavorite() {
            toggleFav(currentCoin);
            closeModal();
            displayCoins();
        }

        function addToPortfolioFromModal() {
            const amount = prompt(`Сколько ${currentCoin} купили?`, '1');
            if (!amount) return;
            const price = prompt('По какой цене?', prices[currentCoin]?.price || '');
            if (!price) return;
            addToPortfolio(currentCoin, parseFloat(amount), parseFloat(price));
            closeModal();
        }

        function showAddAlertForCoin() {
            const price = prompt(`Целевая цена для ${currentCoin}:`, prices[currentCoin]?.price || '');
            if (!price) return;
            const direction = confirm('Алерт при цене ВЫШЕ указанной?\nOK = выше, Отмена = ниже') ? 'above' : 'below';
            addAlert(currentCoin, parseFloat(price), direction);
            closeModal();
        }

        // ====== ИЗБРАННОЕ ======
        function toggleFav(symbol) {
            const idx = favorites.indexOf(symbol);
            if (idx >= 0) {
                favorites.splice(idx, 1);
                showToast(`❌ ${symbol} удалён из избранного`);
            } else {
                favorites.push(symbol);
                showToast(`⭐ ${symbol} добавлен в избранное`);
            }
            saveData();
            displayCoins();
            displayFavorites();
        }

        function displayFavorites() {
            const container = document.getElementById('favoritesList');
            if (favorites.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">⭐</div><p>Избранное пусто</p><p style="font-size:13px;">Нажимайте ☆ у монет для добавления</p></div>';
                return;
            }

            let html = '';
            favorites.forEach(sym => {
                const coin = prices[sym];
                if (coin) {
                    const priceStr = coin.price < 1 ? coin.price.toFixed(4) : coin.price.toFixed(2);
                    html += `
                        <div class="coin-card" onclick="openCoinDetail('${sym}')" style="margin-bottom:8px;">
                            <span class="fav-star" onclick="event.stopPropagation(); toggleFav('${sym}')">⭐</span>
                            <div class="symbol">${sym}</div>
                            <div class="price">$${priceStr}</div>
                            <div class="change ${coin.change >= 0 ? 'positive' : 'negative'}">${coin.change >= 0 ? '+' : ''}${coin.change.toFixed(2)}%</div>
                        </div>
                    `;
                }
            });
            container.innerHTML = html;
        }

        // ====== ПОРТФЕЛЬ ======
        function addToPortfolio(symbol, amount, buyPrice) {
            portfolio.push({
                symbol: symbol,
                amount: amount,
                buyPrice: buyPrice,
                date: new Date().toISOString()
            });
            saveData();
            displayPortfolio();
            showToast(`✅ ${amount} ${symbol} добавлено в портфель`);
        }

        function removeFromPortfolio(index) {
            portfolio.splice(index, 1);
            saveData();
            displayPortfolio();
            showToast('🗑 Актив удалён');
        }

        function clearPortfolio() {
            if (confirm('Удалить весь портфель?')) {
                portfolio = [];
                saveData();
                displayPortfolio();
                showToast('🗑 Портфель очищен');
            }
        }

        function displayPortfolio() {
            const container = document.getElementById('portfolioList');
            const summary = document.getElementById('portfolioSummary');

            if (portfolio.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">💼</div><p>Портфель пуст</p></div>';
                summary.innerHTML = '<p class="total-label">💰 Общая стоимость</p><p class="total-value">$0.00</p><p class="pnl">Добавьте активы</p>';
                return;
            }

            let totalInvested = 0;
            let totalCurrent = 0;
            let html = '';

            portfolio.forEach((item, index) => {
                const coin = prices[item.symbol];
                const currentPrice = coin ? coin.price : 0;
                const invested = item.amount * item.buyPrice;
                const current = item.amount * currentPrice;
                const pnl = current - invested;
                const pnlPercent = invested > 0 ? (pnl / invested) * 100 : 0;

                totalInvested += invested;
                totalCurrent += current;

                html += `
                    <div class="portfolio-item">
                        <span class="pf-symbol">${item.symbol}</span>
                        <button class="delete-btn" onclick="removeFromPortfolio(${index})">🗑</button>
                        <div class="pf-details">
                            ${item.amount} шт. • Вход: $${item.buyPrice.toFixed(2)} • Сейчас: $${currentPrice.toFixed(2)}
                        </div>
                        <div class="pf-pnl" style="color: ${pnl >= 0 ? 'var(--green)' : 'var(--red)'}">
                            PnL: $${pnl.toFixed(2)} (${pnlPercent.toFixed(2)}%)
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            const totalPnl = totalCurrent - totalInvested;
            const totalPercent = totalInvested > 0 ? (totalPnl / totalInvested) * 100 : 0;

            summary.innerHTML = `
                <p class="total-label">💰 Общая стоимость</p>
                <p class="total-value">$${totalCurrent.toFixed(2)}</p>
                <p class="pnl" style="color: ${totalPnl >= 0 ? 'var(--green)' : 'var(--red)'}">
                    PnL: $${totalPnl.toFixed(2)} (${totalPercent.toFixed(2)}%)
                </p>
                <p style="font-size:12px; color:var(--text-secondary); margin-top:4px;">
                    Инвестировано: $${totalInvested.toFixed(2)}
                </p>
            `;
        }
