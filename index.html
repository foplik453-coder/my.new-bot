<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚀 CryptoBot Pro</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #151520;
            --card2: #1c1c2e;
            --gold: #f7931a;
            --gold2: #ffaa4a;
            --green: #00e676;
            --red: #ff3d5a;
            --text: #ffffff;
            --text2: #9e9eb8;
            --border: #252540;
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 90px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 20px;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 10px; color: var(--text2); }

        .marquee {
            background: #111;
            padding: 8px 0;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 25s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .marquee-item {
            display: inline-block;
            padding: 3px 10px;
            margin: 0 3px;
            background: var(--card);
            border-radius: 15px;
            font-size: 11px;
        }
        .up { color: var(--green); }
        .down { color: var(--red); }

        /* НАВИГАЦИЯ - ИСПРАВЛЕНО */
        .nav {
            display: flex;
            gap: 5px;
            padding: 8px;
            overflow-x: auto;
            background: var(--bg);
            position: sticky;
            top: 100px;
            z-index: 99;
            scrollbar-width: none;
        }
        .nav::-webkit-scrollbar { display: none; }
        
        .nav-btn {
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text2);
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: 0.3s;
        }
        .nav-btn.active {
            background: var(--gold);
            color: #000;
            font-weight: 700;
            border-color: var(--gold);
        }
        .nav-badge {
            background: rgba(0,0,0,0.3);
            padding: 1px 6px;
            border-radius: 8px;
            font-size: 10px;
        }

        .container { padding: 10px; max-width: 500px; margin: 0 auto; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            margin: 16px 0 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .coin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .coin-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 12px;
            cursor: pointer;
            border: 1px solid var(--border);
            position: relative;
            transition: 0.2s;
        }
        .coin-card:active { transform: scale(0.97); border-color: var(--gold); }

        .coin-symbol { font-size: 14px; font-weight: 700; }
        .coin-rank { font-size: 9px; color: var(--text2); }
        .coin-star {
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 16px;
            cursor: pointer;
            z-index: 2;
        }
        .coin-price { font-size: 16px; font-weight: 700; color: var(--green); margin: 3px 0; }
        .coin-change { font-size: 11px; font-weight: 600; }
        .coin-change.up { color: var(--green); }
        .coin-change.down { color: var(--red); }
        .coin-volume { font-size: 9px; color: var(--text2); margin-top: 2px; }

        .popularity-bar {
            height: 4px;
            background: var(--card2);
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }
        .popularity-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold2));
        }

        .pf-summary {
            background: linear-gradient(135deg, #1a1a35, #151528);
            border-radius: 18px;
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .pf-total-value {
            font-size: 30px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .pf-item, .alert-item {
            background: var(--card);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 6px;
            border: 1px solid var(--border);
        }
        .pf-symbol { font-size: 14px; font-weight: 700; }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin: 5px 0;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn-red { background: var(--red); color: #fff; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            padding: 20px;
            overflow-y: auto;
        }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-box {
            background: var(--card);
            border-radius: 20px;
            padding: 16px;
            width: 100%;
            max-width: 360px;
            border: 1px solid var(--border);
        }
        .modal-close {
            float: right;
            background: var(--card2);
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
        }
        .modal-symbol { font-size: 20px; font-weight: 800; }
        .modal-price { font-size: 32px; font-weight: 800; margin: 8px 0; }

        .detail-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin: 8px 0;
        }
        .detail-stat {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 8px;
            text-align: center;
        }
        .detail-stat-label { font-size: 9px; color: var(--text2); }
        .detail-stat-value { font-size: 13px; font-weight: 700; }

        .toast {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 300;
            display: none;
        }

        /* НИЖНЯЯ НАВИГАЦИЯ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            display: flex;
            border-top: 1px solid var(--border);
            z-index: 100;
            padding: 4px;
        }
        .bottom-btn {
            flex: 1;
            padding: 6px;
            border: none;
            background: none;
            color: var(--text2);
            font-size: 9px;
            cursor: pointer;
            text-align: center;
        }
        .bottom-btn .b-icon { font-size: 20px; display: block; }
        .bottom-btn.active { color: var(--gold); }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            margin: 8px 0;
            outline: none;
        }
        .search-input:focus { border-color: var(--gold); }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--text2);
        }
        .empty-icon { font-size: 50px; margin-bottom: 8px; }

        @media (max-width: 380px) {
            .coin-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 CryptoBot Pro</h1>
        <p>REAL-TIME TRACKER</p>
    </div>

    <div class="marquee">
        <div class="marquee-content" id="marquee">Загрузка...</div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="nav">
        <button class="nav-btn active" onclick="switchTab('prices')">💰 Цены</button>
        <button class="nav-btn" onclick="switchTab('portfolio')">💼 Портфель <span class="nav-badge" id="pfBadge">0</span></button>
        <button class="nav-btn" onclick="switchTab('favorites')">⭐ Избранное <span class="nav-badge" id="favBadge">0</span></button>
        <button class="nav-btn" onclick="switchTab('alerts')">🔔 Алерты <span class="nav-badge" id="alertBadge">0</span></button>
    </div>

    <div class="container">
        <!-- ЦЕНЫ -->
        <div class="tab-content active" id="tab-prices">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск монеты..." oninput="searchCoins()">
            <div class="section-title">📈 Лидеры роста</div>
            <div class="coin-grid" id="gainersGrid"></div>
            <div class="section-title">📉 Падение</div>
            <div class="coin-grid" id="losersGrid"></div>
            <div class="section-title">🔥 Популярные</div>
            <div class="coin-grid" id="allCoinsGrid"></div>
        </div>

        <!-- ПОРТФЕЛЬ -->
        <div class="tab-content" id="tab-portfolio">
            <div class="pf-summary">
                <p style="font-size:10px;color:var(--text2);">ОБЩАЯ СТОИМОСТЬ</p>
                <p class="pf-total-value" id="pfTotalValue">$0.00</p>
                <p style="font-size:13px;" id="pfTotalPnl">Добавьте монеты</p>
            </div>
            <div id="pfList"></div>
            <button class="btn btn-gold" onclick="addPortfolioCoin()">➕ Добавить монету</button>
            <button class="btn btn-outline" onclick="clearPortfolio()">🗑 Очистить</button>
        </div>

        <!-- ИЗБРАННОЕ -->
        <div class="tab-content" id="tab-favorites">
            <div class="coin-grid" id="favGrid"></div>
        </div>

        <!-- АЛЕРТЫ -->
        <div class="tab-content" id="tab-alerts">
            <div id="alertList"></div>
            <button class="btn btn-gold" onclick="addAlert()">➕ Создать алерт</button>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div class="modal" id="coinModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <p class="modal-symbol" id="modSymbol">BTC</p>
            <p class="modal-price" id="modPrice">$0.00</p>
            <div class="detail-stats">
                <div class="detail-stat">
                    <div class="detail-stat-label">24ч</div>
                    <div class="detail-stat-value" id="modChange">0%</div>
                </div>
                <div class="detail-stat">
                    <div class="detail-stat-label">Макс</div>
                    <div class="detail-stat-value" id="modHigh">$0</div>
                </div>
                <div class="detail-stat">
                    <div class="detail-stat-label">Мин</div>
                    <div class="detail-stat-value" id="modLow">$0</div>
                </div>
                <div class="detail-stat">
                    <div class="detail-stat-label">Объём</div>
                    <div class="detail-stat-value" id="modVolume">$0</div>
                </div>
            </div>
            <div class="popularity-bar">
                <div class="popularity-fill" id="modPopularity" style="width:50%;"></div>
            </div>
            <p style="font-size:10px;color:var(--text2);margin-top:4px;">Популярность</p>
            <button class="btn btn-gold" id="modFavBtn" onclick="toggleFavModal()" style="margin-top:10px;">⭐ Избранное</button>
            <button class="btn btn-outline" onclick="addToPortfolioFromModal()">💼 В портфель</button>
            <button class="btn btn-outline" onclick="alertFromModal()">🔔 Ал

ерт</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- НИЖНЯЯ НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <button class="bottom-btn active" onclick="switchTab('prices')"><span class="b-icon">💰</span>Цены</button>
        <button class="bottom-btn" onclick="switchTab('portfolio')"><span class="b-icon">💼</span>Портфель</button>
        <button class="bottom-btn" onclick="switchTab('favorites')"><span class="b-icon">⭐</span>Избранное</button>
        <button class="bottom-btn" onclick="switchTab('alerts')"><span class="b-icon">🔔</span>Алерты</button>
    </div>

    <script>
        // Глобальные переменные
        let allCoins = [];
        let favorites = JSON.parse(localStorage.getItem('crypto_fav') || '[]');
        let portfolio = JSON.parse(localStorage.getItem('crypto_pf') || '[]');
        let alerts = JSON.parse(localStorage.getItem('crypto_alerts') || '[]');
        let currentCoin = 'BTC';

        // ИНИЦИАЛИЗАЦИЯ
        fetchData();
        setInterval(fetchData, 30000);
        setInterval(checkAlerts, 15000);

        async function fetchData() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const data = await res.json();
                allCoins = data
                    .filter(i => i.symbol.endsWith('USDT'))
                    .map((i, idx) => ({
                        s: i.symbol.replace('USDT', ''),
                        p: parseFloat(i.lastPrice),
                        c: parseFloat(i.priceChangePercent),
                        h: parseFloat(i.highPrice),
                        l: parseFloat(i.lowPrice),
                        v: parseFloat(i.volume),
                        q: parseFloat(i.quoteVolume),
                        rank: idx + 1
                    }))
                    .filter(c => c.p > 0.0001 && c.q > 50000);
                
                allCoins.sort((a,b) => b.q - a.q);
                allCoins.forEach((c, i) => c.rank = i + 1);
                
                updateAll();
            } catch(e) {
                console.error(e);
            }
        }

        function updateAll() {
            displayPrices();
            updateMarquee();
            updatePortfolio();
            updateFavorites();
            updateAlerts();
            updateBadges();
        }

        // ФОРМАТИРОВАНИЕ
        function fmtPrice(p) {
            if (p < 0.001) return p.toFixed(6);
            if (p < 1) return p.toFixed(4);
            if (p < 100) return p.toFixed(2);
            return p.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function fmtVol(v) {
            if (v > 1e9) return '$' + (v/1e9).toFixed(1) + 'B';
            if (v > 1e6) return '$' + (v/1e6).toFixed(0) + 'M';
            return '$' + (v/1e3).toFixed(0) + 'K';
        }

        // ОТОБРАЖЕНИЕ ЦЕН
        function displayPrices() {
            const gainers = [...allCoins].sort((a,b) => b.c - a.c).slice(0, 6);
            const losers = [...allCoins].sort((a,b) => a.c - b.c).slice(0, 6);
            const popular = [...allCoins].sort((a,b) => b.q - a.q).slice(0, 20);

            document.getElementById('gainersGrid').innerHTML = gainers.map(c => coinHTML(c)).join('');
            document.getElementById('losersGrid').innerHTML = losers.map(c => coinHTML(c)).join('');
            document.getElementById('allCoinsGrid').innerHTML = popular.map(c => coinHTML(c)).join('');
        }

        function coinHTML(coin) {
            const isFav = favorites.includes(coin.s);
            const pop = Math.min(100, Math.round((coin.q / (allCoins[0]?.q || 1)) * 100));
            return `
                <div class="coin-card" onclick="openModal('${coin.s}')">
                    <span class="coin-star" onclick="event.stopPropagation();toggleFav('${coin.s}')">${isFav ? '⭐' : '☆'}</span>
                    <div class="coin-symbol">${coin.s} <span class="coin-rank">#${coin.rank}</span></div>
                    <div class="coin-price">$${fmtPrice(coin.p)}</div>
                    <div class="coin-change ${coin.c >= 0 ? 'up' : 'down'}">${coin.c >= 0 ? '📈 +' : '📉 '}${coin.c.toFixed(2)}%</div>
                    <div class="coin-volume">Vol: ${fmtVol(coin.q)}</div>
                    <div class="popularity-bar"><div class="popularity-fill" style="width:${pop}%;"></div></div>
                </div>`;
        }

        function updateMarquee() {
            const top = [...allCoins].sort((a,b) => b.c - a.c).slice(0, 15);
            document.getElementById('marquee').innerHTML = 
                top.map(c => `<span class="marquee-item">${c.s} <span class="${c.c>=0?'up':'down'}">${c.c>=0?'+':''}${c.c.toFixed(2)}%</span></span>`).join(' • ') +
                ' • ' + top.map(c => `<span class="marquee-item">${c.s} <span class="${c.c>=0?'up':'down'}">${c.c>=0?'+':''}${c.c.toFixed(2)}%</span></span>`).join(' • ');
        }

        // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК (ИСПРАВЛЕНО)
        function switchTab(tabName) {
            // Скрываем все вкладки
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            // Показываем нужную
            const tabEl = document.getElementById('tab-' + tabName);
            if (tabEl) tabEl.classList.add('active');
            
            // Обновляем верхнюю навигацию
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const navBtns = document.querySelectorAll('.nav-btn');
            const tabs = ['prices', 'portfolio', 'favorites', 'alerts'];
            const idx = tabs.indexOf(tabName);
            if (idx >= 0 && navBtns[idx]) navBtns[idx].classList.add('active');
            
            // Обновляем нижнюю навигацию
            document.querySelectorAll('.bottom-btn').forEach(b => b.classList.remove('active'));
            const bottomBtns = document.querySelectorAll('.bottom-btn');
            if (idx >= 0 && bottomBtns[idx]) bottomBtns[idx].classList.add('active');
        }

        // МОДАЛЬНОЕ ОКНО
        function openModal(sym) {
            currentCoin = sym;
            const coin = allCoins.find(c => c.s === sym);
            if (!coin) return;
            
            document.getElementById('modSymbol').textContent = sym + ' #' + coin.rank;
            document.getElementById('modPrice').textContent = '$' + fmtPrice(coin.p);
            
            const changeEl = document.getElementById('modChange');
            changeEl.textContent = (coin.c >= 0 ? '+' : '') + coin.c.toFixed(2) + '%';
            changeEl.style.color = coin.c >= 0 ? 'var(--green)' : 'var(--red)';
            
            document.getElementById('modHigh').textContent = '$' + fmtPrice(coin.h);
            document.getElementById('modLow').textContent = '$' + fmtPrice(coin.l);
            document.getElementById('modVolume').textContent = fmtVol(coin.q);
            
            const pop = Math.min(100, Math.round((coin.q / (allCoins[0]?.q || 1)) * 100));
            document.getElementById('modPopularity').style.width = pop + '%';
            
            document.getElementById('modFavBtn').textContent = favorites.includes(sym) ? '⭐ Удалить из избранного' : '☆ В избранное';
            
            document.getElementById('coinModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('coinModal').classList.remove('active');
        }

        // ИЗБРАННОЕ
        function toggleFav(sym) {
            const idx = favorites.indexOf(sym);
            if (idx >= 0) {
                favorites.splice(idx, 1);
                toast('❌ Удалено из избранного');
            } else {
                favorites.push(sym);
                toast('⭐ Добавлено в избранное');
            }
            localStorage.setItem('crypto_fav', JSON.stringify(favorites));
            displayPrices();
            updateFavorites();
            updateBadges();
        }

        function toggleFavModal() {
            toggleFav(currentCoin);
            document.getElementById('modFavBtn').textContent = favorites.includes(currentCoin) ? '⭐ Удалить из избранного' : '☆ В избранное';
        }

        function updateFavorites() {
            const favCoins = allCoins.filter(c => favorites.includes(c.s));
            const grid = document.getElementById('favGrid');
            if (favCoins.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">⭐</div><p>Избранное пусто</p><p style="font-size:12px;">Нажимайте ☆ на монетах</p></div>';
            } else {
                grid.innerHTML = favCoins.map(c => coinHTML(c)).join('');
            }
        }

        // ПОРТФЕЛЬ
        function addPortfolioCoin() {
            const sym = prompt('Символ монеты (BTC, ETH...):');
            if (!sym) return;
            const amt = prompt('Количество:');
            if (!amt) return;
            const price = prompt('Цена покупки (USD):');
            if (!price) return;
            
            portfolio.push({
                symbol: sym.toUpperCase(),
                amount: parseFloat(amt),
                buyPrice: parseFloat(price),
                date: new Date().toISOString()
            });
            localStorage.setItem('crypto_pf', JSON.stringify(portfolio));
            updatePortfolio();
            updateBadges();
            toast('✅ Добавлено в портфель!');
        }

        function addToPortfolioFromModal() {
            const amt = prompt(`Количество ${currentCoin}:`, '1');
            if (!amt) return;
            const coin = allCoins.find(c => c.s === currentCoin);
            const price = prompt('Цена покупки (USD):', coin ? fmtPrice(coin.p) : '');
            if (!price) return;
            
            portfolio.push({
                symbol: currentCoin,
                amount: parseFloat(amt),
                buyPrice: parseFloat(price),
                date: new Date().toISOString()
            });
            localStorage.setItem('crypto_pf', JSON.stringify(portfolio));
            updatePortfolio();
            updateBadges();
            closeModal();
            toast('✅ Добавлено в портфель!');
        }

        function removeFromPortfolio(index) {
            portfolio.splice(index, 1);
            localStorage.setItem('crypto_pf', JSON.stringify(portfolio));
            updatePortfolio();
            updateBadges();
            toast('🗑 Удалено');
        }

        function clearPortfolio() {
            if (confirm('Очистить весь портфель?')) {
                portfolio = [];
                localStorage.setItem('crypto_pf', JSON.stringify(portfolio));
                updatePortfolio();
                updateBadges();
                toast('🗑 Портфель очищен');
            }
        }

        function updatePortfolio() {
            const list = document.getElementById('pfList');
            const totalVal = document.getElementById('pfTotalValue');
            const totalPnl = document.getElementById('pfTotalPnl');
            
            if (portfolio.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">💼</div><p>Портфель пуст</p></div>';
                totalVal.textContent = '$0.00';
                totalPnl.innerHTML = '<span style="color:var(--text2);">Добавьте монеты</span>';
                return;
            }
            
            let totalInv = 0, totalCur = 0;
            
            list.innerHTML = portfolio.map((item, i) => {
                const coin = allCoins.find(c => c.s === item.symbol);
                const curPrice = coin ? coin.p : 0;
                const change24 = coin ? coin.c : 0;
                const inv = item.amount * item.buyPrice;
                const cur = item.amount * curPrice;
                const pnl = cur - inv;
                const pnlP = inv > 0 ? (pnl / inv) * 100 : 0;
                totalInv += inv;
                totalCur += cur;
                
                const pop = coin ? Math.min(100, Math.round((coin.q / (allCoins[0]?.q || 1)) * 100)) : 0;
                
                return `
                    <div class="pf-item">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <span class="pf-symbol">${item.symbol}</span>
                            <span style="color:var(--red);cursor:pointer;font-size:16px;" onclick="removeFromPortfolio(${i})">🗑</span>
                        </div>
                        <div style="font-size:11px;color:var(--text2);margin-top:4px;">
                            ${item.amount} шт. • Вход: $${fmtPrice(item.buyPrice)} • Сейчас: $${fmtPrice(curPrice)}
                        </div>
                        <div style="font-size:11px;color:var(--text2);">
                            24ч: <span style="color:${change24>=0?'var(--green)':'var(--red)'}">${change24>=0?'+':''}${change24.toFixed(2)}%</span>
                        </div>
                        <div style="font-size:12px;font-weight:600;color:${pnl>=0?'var(--green)':'var(--red)'};margin-top:4px;">
                            PnL: $${pnl.toFixed(2)} (${pnlP.toFixed(2)}%)
                        </div>
                        <div class="popularity-bar" style="margin-top:6px;">
                            <div class="popularity-fill" style="width:${pop}%;"></div>
                        </div>
                    </div>`;
            }).join('');
            
            const totalPnlVal = totalCur - totalInv;
            const totalPnlP = totalInv > 0 ? (totalPnlVal / totalInv) * 100 : 0;
            
            totalVal.textContent = '$' + fmtPrice(totalCur);
            totalPnl.innerHTML = `
                <span style="color:${totalPnlVal>=0?'var(--green)':'var(--red)'}">
                    PnL: $${totalPnlVal.toFixed(2)} (${totalPnlP.toFixed(2)}%)
                </span>
                <br><span style="font-size:10px;color:var(--text2);">Инвестировано: $${fmtPrice(totalInv)}</span>
            `;
        }

        // АЛЕРТЫ
        function addAlert() {
            const sym = prompt('Символ монеты:');
            if (!sym) return;
            const dir = confirm('Алерт при цене ВЫШЕ?\nOK = выше, Отмена = ниже') ? 'above' : 'below';
            const price = prompt('Целевая цена (USD):');
            if (!price) return;
            
            alerts.push({
                symbol: sym.toUpperCase(),
                direction: dir,
                price: parseFloat(price),
                date: new Date().toISOString()
            });
            localStorage.setItem('crypto_alerts', JSON.stringify(alerts));
            updateAlerts();
            updateBadges();
            toast('🔔 Алерт создан!');
        }

        function alertFromModal() {
            const coin = allCoins.find(c => c.s === currentCoin);
            const price = prompt(`Целевая цена для ${currentCoin} (USD):`, coin ? fmtPrice(coin.p) : '');
            if (!price) return;
            const dir = confirm('Алерт при цене ВЫШЕ?\nOK = выше, Отмена = ниже') ? 'above' : 'below';
            
            alerts.push({
                symbol: currentCoin,
                direction: dir,
                price: parseFloat(price),
                date: new Date().toISOString()
            });
            localStorage.setItem('crypto_alerts', JSON.stringify(alerts));
            updateAlerts();
            updateBadges();
            closeModal();
            toast('🔔 Алерт создан!');
        }

        function removeAlert(index) {
            alerts.splice(index, 1);
            localStorage.setItem('crypto_alerts', JSON.stringify(alerts));
            updateAlerts();
            updateBadges();
            toast('🗑 Алерт удалён');
        }

        function updateAlerts() {
            const list = document.getElementById('alertList');
            if (alerts.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔔</div><p>Нет активных алертов</p></div>';
                return;
            }
            
            list.innerHTML = alerts.map((a, i) => {
                const coin = allCoins.find(c => c.s === a.symbol);
                const curPrice = coin ? coin.p : null;
                const badgeClass = a.direction === 'above' ? 'up' : 'down';
                const badgeText = a.direction === 'above' ? '⬆️ ВЫШЕ' : '⬇️ НИЖЕ';
                
                return `
                    <div class="alert-item" style="display:flex;justify-content:space-between;align-items:center;">
                        <div>
                            <strong>${a.symbol}</strong>
                            <span class="coin-change ${badgeClass}" style="margin-left:6px;">${badgeText} $${fmtPrice(a.price)}</span>
                            <div style="font-size:11px;color:var(--text2);margin-top:2px;">
                                Сейчас: ${curPrice ? '$' + fmtPrice(curPrice) : '?'}
                            </div>
                        </div>
                        <span style="color:var(--red);cursor:pointer;font-size:16px;" onclick="removeAlert(${i})">🗑</span>
                    </div>`;
            }).join('');
        }

        function checkAlerts() {
            alerts.forEach((a, i) => {
                const coin = allCoins.find(c => c.s === a.symbol);
                if (!coin) return;
                if ((a.direction === 'above' && coin.p >= a.price) || 
                    (a.direction === 'below' && coin.p <= a.price)) {
                    alerts.splice(i, 1);
                    localStorage.setItem('crypto_alerts', JSON.stringify(alerts));
                    updateAlerts();
                    updateBadges();
                    alert(`🚨 АЛЕРТ!\n${a.symbol} достиг $${fmtPrice(coin.p)}\nУсловие: ${a.direction === 'above' ? 'выше' : 'ниже'} $${fmtPrice(a.price)}`);
                }
            });
        }
