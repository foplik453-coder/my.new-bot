<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚀 CryptoBot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #fff;
            --text2: #999;
            --green: #00d4aa;
            --red: #ff4757;
            --orange: #f7931a;
            --border: #2a2a2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 0 80px;
        }

        .header {
            background: linear-gradient(135deg, #f7931a, #e84393);
            padding: 20px 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 { font-size: 22px; }
        .header p { font-size: 12px; opacity: 0.9; }

        .ticker {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            overflow-x: auto;
            background: #111;
            white-space: nowrap;
        }
        .ticker-item {
            background: var(--card);
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            flex-shrink: 0;
        }
        .up { color: var(--green); }
        .down { color: var(--red); }

        .nav {
            display: flex;
            gap: 6px;
            padding: 10px;
            overflow-x: auto;
            position: sticky;
            top: 110px;
            background: var(--bg);
            z-index: 9;
        }
        .nav button {
            padding: 8px 14px;
            border-radius: 18px;
            border: none;
            background: var(--card);
            color: var(--text2);
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .nav button.active {
            background: var(--orange);
            color: #000;
            font-weight: bold;
        }

        .content { padding: 12px; display: none; }
        .content.active { display: block; }

        .coin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .coin-card {
            background: var(--card);
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            border: 1px solid var(--border);
            position: relative;
        }
        .coin-card:active { background: #252525; }
        .coin-card .star {
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 16px;
        }
        .coin-card .symbol { font-weight: bold; font-size: 14px; }
        .coin-card .price { font-size: 16px; color: var(--green); margin-top: 4px; }
        .coin-card .change { font-size: 12px; margin-top: 2px; }

        .section-title {
            font-size: 15px;
            font-weight: bold;
            margin: 16px 0 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-box {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 350px;
        }
        .modal-box h2 { font-size: 22px; margin-bottom: 4px; }
        .modal-box .mprice { font-size: 32px; font-weight: bold; margin: 10px 0; }
        .modal-box .row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-top: 1px solid #2a2a2a;
            font-size: 13px;
        }
        .modal-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            margin-top: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-fav { background: #f7931a; color: #000; }
        .btn-close { background: #333; color: #fff; }

        .pf-item, .alert-item {
            background: var(--card);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .pf-item .pnl { font-weight: bold; }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            margin: 6px 0;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-orange { background: #f7931a; color: #000; }
        .btn-red { background: #ff4757; color: #fff; }
        .btn-outline { background: transparent; border: 2px solid #f7931a; color: #f7931a; }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        .empty .icon { font-size: 40px; margin-bottom: 10px; }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 999;
            display: none;
        }

        .summary {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            margin-bottom: 12px;
        }
        .summary .total { font-size: 28px; font-weight: bold; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            display: flex;
            border-top: 1px solid #2a2a2a;
            z-index: 10;
        }
        .bottom-nav button {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            color: #999;
            font-size: 10px;
            cursor: pointer;
        }
        .bottom-nav button span { font-size: 18px; display: block; }
        .bottom-nav button.active { color: #f7931a; }

        input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            color: #fff;
            margin: 8px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 CryptoBot</h1>
        <p>Web App • Реальное время</p>
    </div>

    <div class="ticker" id="ticker">Загрузка...</div>

    <div class="nav">
        <button class="active" onclick="switchTab('prices')">💰 Цены</button>
        <button onclick="switchTab('portfolio')">💼 Портфель</button>
        <button onclick="switchTab('favorites')">⭐ Избранное</button>
        <button onclick="switchTab('alerts')">🔔 Алерты</button>
        <button onclick="switchTab('profile')">👤 Профиль</button>
    </div>

    <!-- Вкладка Цены -->
    <div class="content active" id="prices">
        <div class="section-title">📈 Лидеры роста</div>
        <div class="coin-grid" id="gainersGrid"></div>
        <div class="section-title">📉 Падение</div>
        <div class="coin-grid" id="losersGrid"></div>
    </div>

    <!-- Вкладка Портфель -->
    <div class="content" id="portfolio">
        <div class="summary" id="pfSummary">
            <p style="color:#999; font-size:12px;">ОБЩАЯ СТОИМОСТЬ</p>
            <p class="total">$0.00</p>
            <p id="pfPnl" style="font-size:14px;">PnL: $0.00</p>
        </div>
        <div id="pfList"></div>
        <button class="btn btn-orange" onclick="addPf()">➕ Добавить актив</button>
        <button class="btn btn-outline" onclick="clearPf()">🗑 Очистить</button>
    </div>

    <!-- Вкладка Избранное -->
    <div class="content" id="favorites">
        <div id="favList"></div>
    </div>

    <!-- Вкладка Алерты -->
    <div class="content" id="alerts">
        <div id="alertList"></div>
        <button class="btn btn-orange" onclick="addAlert()">➕ Создать алерт</button>
    </div>

    <!-- Вкладка Профиль -->
    <div class="content" id="profile">
        <div style="background:#1a1a1a; border-radius:16px; padding:20px; text-align:center;">
            <div style="font-size:50px;">👤</div>
            <p style="font-size:18px; font-weight:bold;" id="profName">Пользователь</p>
            <p style="color:#999;" id="profUser">@user</p>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:12px;">
            <div class="pf-item" style="text-align:center;">
                <div style="font-size:22px; color:#f7931a;" id="statPf">0</div>
                <div style="font-size:11px; color:#999;">Активов</div>
            </div>
            <div class="pf-item" style="text-align:center;">
                <div style="font-size:22px; color:#f7931a;" id="statFav">0</div>
                <div style="font-size:11px; color:#999;">Избранных</div>
            </div>
            <div class="pf-item" style="text-align:center;">
                <div style="font-size:22px; color:#f7931a;" id="statAlert">0</div>
                <div style="font-size:11px; color:#999;">Алертов</div>
            </div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <h2 id="modSymbol">BTC</h2>
            <p class="mprice" id="modPrice">$0.00</p>
            <div class="row"><span>24ч изменение</span><span id="modChange">0%</span></div>
            <div class="row"><span>Максимум</span><span id="modHigh">$0</span></div>
            <div class="row"><span>Минимум</span><span id="modLow">$0</span></div>
            <button class="btn-fav" onclick="toggleFav()">⭐ В избранное</button>
            <button class="btn-close" onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <div class="bottom-nav">
        <button class="active" onclick="switchTab('prices')"><span>💰</span>Цены</button>
        <button onclick="switchTab('portfolio')"><span>💼</span>Портфель</button>
        <button onclick="switchTab('favorites')"><span>⭐</span>Избранное</button>
        <button onclick="switchTab('alerts')"><span>🔔</span>Алерты</button>
        <button onclick="switchTab('profile')"><span>👤</span>Профиль</button>
    </div>

    <script>
        // Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Данные
        let allCoins = [];
        let favorites = JSON.parse(localStorage.getItem('crypto_fav') || '[]');
        let portfolio = JSON.parse(localStorage.getItem('crypto_pf') || '[]');
        let alerts = JSON.parse(localStorage.getItem('crypto_alerts') || '[]');
        let currentCoin = '';

        // API Binance
        async function fetchPrices() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const data = await res.json();
                allCoins = data
                    .filter(i => i.symbol.endsWith('USDT'))
                    .map(i => ({
                        s: i.symbol.replace('USDT', ''),
                        p: parseFloat(i.lastPrice),
                        c: parseFloat(i.priceChangePercent),
                        h: parseFloat(i.highPrice),
                        l: parseFloat(i.lowPrice),
                        v: parseFloat(i.volume)
                    }))
                    .filter(c => c.p > 0.001 && Math.abs(c.c) > 0);
                updateAll();
            } catch(e) {
                console.error(e);
            }
        }

        function updateAll() {
            displayPrices();
            updateTicker();
            displayPortfolio();
            displayFavorites();
            displayAlerts();
            displayProfile();
        }

        function getPrice(sym) {
            const c = allCoins.find(x => x.s === sym);
            return c ? c.p : null;
        }

        // Отображение цен
        function displayPrices() {
            const sorted = [...allCoins].sort((a,b) => b.v - a.v);
            const gainers = [...allCoins].sort((a,b) => b.c - a.c).slice(0, 10);
            const losers = [...allCoins].sort((a,b) => a.c - b.c).slice(0, 10);

            document.getElementById('gainersGrid').innerHTML = gainers.slice(0,6).map(c => coinCard(c)).join('');
            document.getElementById('losersGrid').innerHTML = losers.slice(0,6).map(c => coinCard(c)).join('');
        }

        function coinCard(coin) {
            const isFav = favorites.includes(coin.s);
            const price = coin.p < 1 ? coin.p.toFixed(4) : coin.p.toFixed(2);
            return `
                <div class="coin-card" onclick="openModal('${coin.s}')">
                    <span class="star" onclick="event.stopPropagation(); toggleFavCoin('${coin.s}')">${isFav ? '⭐' : '☆'}</span>
                    <div class="symbol">${coin.s}</div>
                    <div class="price">$${price}</div>
                    <div class="change" style="color:${coin.c >=0 ? 'var(--green)' : 'var(--red)'}">${coin.c>=0?'+':''}${coin.c.toFixed(2)}%</div>
                </div>`;
        }

        function updateTicker() {
            const top = [...allCoins].sort((a,b) => b.c - a.c).slice(0, 5);
            document.getElementById('ticker').innerHTML = top.map(c => 
                `<span class="ticker-item">${c.s} <span class="${c.c>=0?'up':'down'}">${c.c>=0?'+':''}${c.c.toFixed(2)}%</span></span>`
            ).join('');
        }

        // Модальное окно
        function openModal(sym) {
            currentCoin = sym;
            const coin = allCoins.find(c => c.s === sym);
            if (!coin) return;
            document.getElementById('modSymbol').textContent = sym;
            document.getElementById('modPrice').textContent = '$' + (coin.p < 1 ? coin.p.toFixed(4) : coin.p.toFixed(2));
            document.getElementById('modChange').innerHTML = `<span style="color:${coin.c>=0?'var(--green)':'var(--red)'}">${coin.c>=0?'+':''}${coin.c.toFixed(2)}%</span>`;
            document.getElementById('modHigh').textContent = '$' + coin.h.toFixed(2);
            document.getElementById('modLow').textContent = '$' + coin.l.toFixed(2);
            document.querySelector('.btn-fav').textContent = favorites.includes(sym) ? '⭐ Удалить из избранного' : '☆ В избранное';
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function toggleFavCoin(sym) {
            toggleFav(sym);
            displayPrices();
            displayFavorites();
        }

        function toggleFav(sym) {
            const idx = favorites.indexOf(sym);
            if (idx >= 0) {
                favorites.splice(idx, 1);
                toast('❌ Удалено из избранного');
            } else {
                favorites.push(sym);
                toast('⭐ Добавлено в избранное');
            }
            localStorage.setItem('crypto_fav', JSON.stringify(favorites));
            if (currentCoin === sym) {
                document.querySelector('.btn-fav').textContent = favorites.includes(sym) ? '⭐ Удалить из избранного' : '☆ В избранное';
            }
        }

        function toggleFav() {
            toggleFav(currentCoin);
            displayPrices();
            displayFavorites();
        }

        // Избранное
        function displayFavorites() {
            const el = document.getElementById('favList');
            if (favorites.length === 0) {
                el.innerHTML = '<div class="empty"><div class="icon">⭐</div><p>Избранное пусто</p><p style="font-size:13px;">Нажимайте ☆ у монет</p></div>';
                return;
            }
            el.innerHTML = favorites.map(sym => {
                const coin = allCoins.find(c => c.s === sym);
                if (!coin) return '';
                return coinCard(coin);
            }).join('');
        }

        // Портфель
        function displayPortfolio() {
            const el = document.getElementById('pfList');
            const summary = document.getElementById('pfSummary');
            
            if (portfolio.length === 0) {
                el.innerHTML = '<div class="empty"><div class="icon">💼</div><p>Портфель пуст</p></div>';
                summary.innerHTML = '<p style="color:#999;font-size:12px;">ОБЩАЯ СТОИМОСТЬ</p><p class="total">$0.00</p><p style="font-size:14px;">Добавьте активы</p>';
                return;
            }

            let totalInv = 0, totalCur = 0;
            el.innerHTML = portfolio.map((item, i) => {
                const price = getPrice(item.symbol);
                const inv = item.amount * item.buyPrice;
                const cur = price ? item.amount * price : 0;
                const pnl = cur - inv;
                const pnlP = inv > 0 ? (pnl / inv) * 100 : 0;
                totalInv += inv;
                totalCur += cur;
                return `
                    <div class="pf-item">
                        <div style="display:flex;justify-content:space-between;">
                            <strong>${item.symbol}</strong>
                            <span style="color:#ff4757;cursor:pointer;" onclick="removePf(${i})">🗑</span>
                        </div>
                        <div style="font-size:13px;color:#999;">${item.amount} шт. • Вход: $${item.buyPrice.toFixed(2)} • Сейчас: $${price ? price.toFixed(2) : '?'}</div>
                        <div class="pnl" style="color:${pnl>=0?'var(--green)':'var(--red)'}">PnL: $${pnl.toFixed(2)} (${pnlP.toFixed(2)}%)</div>
                    </div>`;
            }).join('');

            const totalPnl = totalCur - totalInv;
            const totalPnlP = totalInv > 0 ? (totalPnl / totalInv) * 100 : 0;
            summary.innerHTML = `
                <p style="color:#999;font-size:12px;">ОБЩАЯ СТОИМОСТЬ</p>
                <p class="total">$${totalCur.toFixed(2)}</p>
                <p style="font-size:14px;color:${totalPnl>=0?'var(--green)':'var(--red)'}">PnL: $${totalPnl.toFixed(2)} (${totalPnlP.toFixed(2)}%)</p>
                <p style="font-size:11px;color:#999;">Инвестировано: $${totalInv.toFixed(2)}</p>
            `;
        }

        function addPf() {
            const sym = prompt('Символ монеты (BTC, ETH...):');
            if (!sym) return;
            const amt = prompt('Количество:');
            if (!amt) return;
            const price = prompt('Цена покупки:');
            if (!price) return;
            portfolio.push({
                symbol: sym.toUpperCase(),
                amount: parseFloat(amt),
                buyPrice: parseFloat(price),
                date: new Date().toISOString()
            });
            localStorage.setItem('crypto_pf', JSON.stringify(portfolio));
            displayPortfolio();
            displayProfile();
            toast('✅ Добавлено!');
        }

        function removePf(i) {
            portfolio.splice(i, 1);
            localStorage.setItem('crypto_pf', JSON.stringify(portfolio));
            displayPortfolio();
            displayProfile();
            toast('🗑 Удалено');
        }

        function clearPf() {
            if (confirm('Очистить портфель?')) {
                portfolio = [];
                localStorage.setItem('crypto_pf', JSON.stringify(portfolio));
                displayPortfolio();
                displayProfile();
                toast('🗑 Очищено');
            }
        }

        // Алерты
        function displayAlerts() {
            const el = document.getElementById('alertList');
            if (alerts.length === 0) {
                el.innerHTML = '<div class="empty"><div class="icon">🔔</div><p>Нет алертов</p></div>';
                return;
            }
            el.innerHTML = alerts.map((a, i) => {
                const price = getPrice(a.symbol);
                return `
                    <div class="alert-item" style="display:flex;justify-content:space-between;align-items:center;">
                        <div>
                            <strong>${a.symbol}</strong>
                            <div style="font-size:13px;color:#999;">${a.direction === 'above' ? '⬆️ Выше' : '⬇️ Ниже'} $${a.price.toFixed(2)}</div>
                            <div style="font-size:12px;">Сейчас: $${price ? price.toFixed(2) : '?'}</div>
                        </div>
                        <span style="color:#ff4757;cursor:pointer;font-size:18px;" onclick="removeAlert(${i})">🗑</span>
                    </div>`;
            }).join('');
        }

        function addAlert() {
            const sym = prompt('Символ монеты:');
            if (!sym) return;
            const dir = confirm('Алерт при цене ВЫШЕ?\nOK = выше, Отмена = ниже') ? 'above' : 'below';
            const price = prompt('Целевая цена:');
            if (!price) return;
            alerts.push({
                symbol: sym.toUpperCase(),
                direction: dir,
                price: parseFloat(price),
                date: new Date().toISOString()
            });
            localStorage.setItem('crypto_alerts', JSON.stringify(alerts));
            displayAlerts();
            displayProfile();
            toast('🔔 Алерт создан!');
        }

        function removeAlert(i) {
            alerts.splice(i, 1);
            localStorage.setItem('crypto_alerts', JSON.stringify(alerts));
            displayAlerts();
            displayProfile();
            toast('🗑 Алерт удалён');
        }

        // Профиль
        function displayProfile() {
            const user = tg.initDataUnsafe?.user || {};
            document.getElementById('profName').textContent = user.first_name || 'Пользователь';
            document.getElementById('profUser').textContent = user.username ? '@' + user.username : 'ID: ' + (user.id || '?');
            document.getElementById('statPf').textContent = portfolio.length;
            document.getElementById('statFav').textContent = favorites.length;
            document.getElementById('statAlert').textContent = alerts.length;
        }

        // Навигация
        function switchTab(tab) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            
            const navBtns = document.querySelectorAll('.nav button');
            const bottomBtns = document.querySelectorAll('.bottom-nav button');
            const tabs = ['prices', 'portfolio', 'favorites', 'alerts', 'profile'];
            const idx = tabs.indexOf(tab);
            
            if (navBtns[idx]) navBtns[idx].classList.add('active');
            if (bottomBtns[idx]) bottomBtns[idx].classList.add('active');
        }

        // Toast
        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        // Проверка алертов
        function checkAlerts() {
            alerts.forEach((a, i) => {
                const price = getPrice(a.symbol);
                if (!price) return;
                if ((a.direction === 'above' && price >= a.price) || 
                    (a.direction === 'below' && price <= a.price)) {
                    tg.showPopup({
                        title: '🚨 АЛЕРТ!',
                        message: `${a.symbol} достиг $${price.toFixed(2)}\nУсловие: ${a.direction === 'above' ? 'выше' : 'ниже'} $${a.price.toFixed(2)}`,
                        buttons: [{type: 'ok'}]
                    });
                    alerts.splice(i, 1);
                    localStorage.setItem('crypto_alerts', JSON.stringify(alerts));
                    displayAlerts();
                }
            });
        }

        // Инициализация
        fetchPrices();
